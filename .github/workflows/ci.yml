name: Test Project

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ git libgtest-dev
      - name: Run tests
        run: |
          chmod +x ./build.sh
          ./build.sh test
